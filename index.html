<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trilha TCDF — Analista de Controle Externo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}

/* ── HEADER ── */
#hdr{background:#1e293b;padding:14px 20px;border-bottom:1px solid #334155;position:sticky;top:0;z-index:50}
.hdr-row1{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.hdr-title{font-size:17px;font-weight:700;color:#f1f5f9}
.hdr-sub{font-size:11px;color:#64748b;margin-left:6px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-btn{background:transparent;border:1px solid #334155;color:#94a3b8;padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
.hdr-btn:hover{background:#334155;color:#f1f5f9}
.big-pct{font-size:26px;font-weight:700;color:#22c55e;min-width:52px;text-align:right}
.pbar-wrap{background:#0f172a;border-radius:4px;height:6px;overflow:hidden;margin-bottom:8px}
.pbar{height:100%;background:#22c55e;width:0%;transition:width .4s;border-radius:4px}
#hstats{display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:#94a3b8}

/* ── BOARD ── */
#board-wrap{overflow-x:auto;padding:12px 8px 20px;-webkit-overflow-scrolling:touch}
#board{display:flex;gap:4px;min-width:max-content;align-items:flex-start}

/* Phase group */
.ph-group{display:flex;flex-direction:column;gap:3px}
.ph-label{border-radius:4px;padding:5px 9px;font-size:10px;font-weight:700;letter-spacing:.06em;text-align:center;color:#fff;white-space:nowrap;cursor:default;user-select:none}
.ph-weeks{display:flex;gap:4px;align-items:flex-start}

/* Week column */
.wk-col{width:168px;background:#1e293b;border-radius:6px;border:1px solid #334155;overflow:hidden}
.wk-hdr{background:#273549;padding:7px 9px;border-bottom:1px solid #334155}
.wk-num{font-size:9px;font-weight:700;color:#64748b;letter-spacing:.08em;margin-bottom:2px}
.wk-title{font-size:11px;font-weight:600;color:#cbd5e1;line-height:1.3;margin-bottom:5px;min-height:28px}
.wk-mini-bar{background:#1e293b;border-radius:2px;height:3px;overflow:hidden;margin-bottom:2px}
.wk-mini-fill{height:100%;background:#22c55e;transition:width .3s}
.wk-prog{font-size:9px;color:#475569}
.wk-days{padding:4px;display:flex;flex-direction:column;gap:3px}

/* Topic box */
.box{border-radius:4px;border:1px solid;padding:6px;cursor:pointer;transition:filter .1s}
.box:hover{filter:brightness(1.15)}
.box-top{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.box-day{font-size:9px;opacity:.65;min-width:22px;flex-shrink:0}
.box-sub{font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;color:#fff;flex-shrink:0}
.box-chk{margin-left:auto;font-size:13px;cursor:pointer;flex-shrink:0;line-height:1;padding:1px}
.box-text{font-size:10px;line-height:1.4}
.box-stats-row{font-size:9px;margin-top:3px;opacity:.7}
.box-form{margin-top:7px;padding-top:7px;display:flex;flex-direction:column;gap:5px}
.box-form-row{display:flex;gap:5px}
.bi-wrap{flex:1;min-width:0}
.bi-lbl{font-size:9px;opacity:.65;margin-bottom:2px}
.bi{width:100%;background:#0f172a;border:1px solid;border-radius:3px;padding:4px 5px;font-size:11px;font-family:inherit;outline:none}
.bsave{width:100%;border:none;border-radius:3px;padding:5px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;color:#fff;transition:opacity .15s}
.bsave:hover{opacity:.85}

/* ── MODAL ── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:center;justify-content:center}
#modal.show{display:flex}
.modal-box{background:#1e293b;border-radius:12px;padding:22px;width:320px;max-width:90vw;border:1px solid #475569}
.modal-title{font-size:14px;font-weight:600;color:#f1f5f9;margin-bottom:12px}
.modal-ta{width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:9px;color:#e2e8f0;font-size:11px;font-family:monospace;height:150px;resize:vertical;outline:none}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.mbtn{flex:1;padding:8px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.mbtn-ok{background:#22c55e;color:#052e16}
.mbtn-ok:hover{background:#16a34a}
.mbtn-cancel{background:#334155;color:#94a3b8}
.mbtn-cancel:hover{background:#475569}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;background:#22c55e;color:#052e16;padding:8px 14px;border-radius:6px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300}
#toast.show{opacity:1}
</style>
</head>

  </div>
  <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
  <div id="hstats"></div>
</div>

<!-- ── BOARD ── -->
<div id="board-wrap">

<!-- ── IMPORT MODAL ── -->
<div id="modal">

    <textarea id="imp-ta" class="modal-ta" placeholder='{"w01d1":{"ok":1,"q":50,"a":78},...}'></textarea>

  </div>
</div>

<!-- ── TOAST ── -->

const DAYS=['Seg','Ter','Qua','Qui','Sex'];
const LS_KEY='tcdf_v2';

let ST={}, OPN=null;

// ─── STORAGE ────────────────────────────
function load(){
  try{
    const r=localStorage.getItem(LS_KEY);
    if(r) ST=JSON.parse(r);
  }catch(e){ST={};}
  PHASES.forEach(ph=>ph.w.forEach(wk=>wk.d.forEach(dy=>{
    if(!ST[dy.id]) ST[dy.id]={ok:0,q:0,a:0};
  })));
}
function save(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(ST));}catch(e){}
}

// ─── STATS ──────────────────────────────
function getStats(){
  let tot=0,done=0,tq=0,ta=0,na=0,sims=0,sdone=0;
  PHASES.forEach(ph=>ph.w.forEach(wk=>wk.d.forEach(dy=>{
    tot++;
    const s=ST[dy.id]||{};
    if(s.ok)done++;
    if(s.q>0){tq+=s.q;ta+=s.a;na++;}
    if(dy.sim){sims++;if(s.ok)sdone++;}
  })));
  return{tot,done,tq,avgA:na>0?Math.round(ta/na):0,sims,sdone};
}

// ─── RENDER HEADER ───────────────────────
function renderHeader(){
  const{tot,done,tq,avgA,sims,sdone}=getStats();
  const pct=tot>0?Math.round(done/tot*100):0;
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('pbar').style.width=pct+'%';
  const c=pct>=80?'#22c55e':pct>=50?'#f59e0b':'#22c55e';
  document.getElementById('pct').style.color=c;
  document.getElementById('pbar').style.background=c;
  document.getElementById('hstats').innerHTML=
    `<span>✅ ${done}/${tot} tópicos</span>`+
    `<span style="opacity:.4">·</span>`+
    `<span>📝 ${tq.toLocaleString('pt-BR')} questões feitas</span>`+
    `<span style="opacity:.4">·</span>`+
    `<span>🎯 ${avgA}% acerto médio</span>`+
    `<span style="opacity:.4">·</span>`+
    `<span>🧪 ${sdone}/${sims} simulados realizados</span>`;
}

// ─── BUILD ONE BOX ───────────────────────
function mkBox(dy,i){
  const s=ST[dy.id]||{ok:0,q:0,a:0};
  const sc=SC[dy.sub]||SC.REV;
  const isOpen=OPN===dy.id;
  const done=s.ok;

  // colors based on state
  const bBg =done?(dy.sim?'#450a0a':'#052e16'):sc.b;
  const bBc =done?(dy.sim?'#dc2626':'#16a34a'):sc.bc;
  const bTx =done?(dy.sim?'#fca5a5':'#86efac'):sc.t;

  const formHtml=isOpen?`
    <div class="box-form" onclick="event.stopPropagation()">
      <div class="box-form-row">
        <div class="bi-wrap">
          <div class="bi-lbl" style="color:${bTx}">Questões feitas</div>
          <input id="qi_${dy.id}" class="bi" type="number" min="0"
            value="${s.q||''}" placeholder="0"
            style="border-color:${sc.bc};color:${bTx};background:#0f172a">
        </div>
        <div class="bi-wrap">
          <div class="bi-lbl" style="color:${bTx}">Acerto (%)</div>
          <input id="ai_${dy.id}" class="bi" type="number" min="0" max="100"
            value="${s.a||''}" placeholder="0"
            style="border-color:${sc.bc};color:${bTx};background:#0f172a">
        </div>
      </div>
      <button class="bsave" style="background:${sc.bc}"
        onclick="saveQA('${dy.id}')">Salvar</button>
    </div>`:'';

  return`<div class="box" id="bx_${dy.id}"
    style="background:${bBg};border-color:${bBc};color:${bTx}"
    onclick="toggleBox('${dy.id}')">
    <div class="box-top">
      <span class="box-day" style="color:${bTx}">${DAYS[i]}</span>
      <span class="box-sub" style="background:${sc.bc}">${dy.sub}</span>
      <span class="box-chk" title="Marcar como concluído"
        onclick="toggleDone('${dy.id}',event)">${done?'✅':'⬜'}</span>
    </div>
    <div class="box-text" style="color:${bTx}">${dy.tx}</div>
    ${s.q>0&&!isOpen?`<div class="box-stats-row" style="color:${bTx}">📝 ${s.q}q &nbsp;🎯 ${s.a}%</div>`:''}
    ${isOpen?`<div style="border-top:1px solid ${sc.bc};margin-top:5px;padding-top:2px"></div>`:''}
    ${formHtml}
  </div>`;
}

// ─── RENDER BOARD ────────────────────────
function renderBoard(){
  const wrap=document.getElementById('board-wrap');
  const sl=wrap.scrollLeft;

  let html='';
  PHASES.forEach(ph=>{
    html+=`<div class="ph-group">`;
    html+=`<div class="ph-label" style="background:${ph.c}">${ph.s}&nbsp;·&nbsp;${ph.n}</div>`;
    html+=`<div class="ph-weeks">`;

    ph.w.forEach(wk=>{
      const wdone=wk.d.filter(d=>ST[d.id]?.ok).length;
      const wpct=Math.round(wdone/wk.d.length*100);
      html+=`<div class="wk-col">`;
      html+=`<div class="wk-hdr">
        <div class="wk-num">SEMANA ${wk.n}</div>
        <div class="wk-title">${wk.t}</div>
        <div class="wk-mini-bar">
          <div class="wk-mini-fill" style="width:${wpct}%"></div>
        </div>
        <div class="wk-prog">${wdone}/${wk.d.length} &nbsp;·&nbsp; ${wpct}%</div>
      </div>`;
      html+=`<div class="wk-days">`;
      wk.d.forEach((dy,i)=>{html+=mkBox(dy,i);});
      html+=`</div></div>`;
    });

    html+=`</div></div>`;
  });

  document.getElementById('board').innerHTML=html;
  wrap.scrollLeft=sl;
}

// ─── ACTIONS ────────────────────────────
function toggleDone(id,e){
  e.stopPropagation();
  if(!ST[id]) ST[id]={ok:0,q:0,a:0};
  ST[id].ok=ST[id].ok?0:1;
  save();
  if(ST[id].ok) toast('✅ Tópico concluído!');
  renderHeader();
  renderBoard();
}

function toggleBox(id){
  OPN=OPN===id?null:id;
  renderBoard();
}

function saveQA(id){
  const q=parseInt(document.getElementById('qi_'+id)?.value)||0;
  const a=Math.min(100,Math.max(0,parseInt(document.getElementById('ai_'+id)?.value)||0));
  if(!ST[id]) ST[id]={ok:0,q:0,a:0};
  ST[id].q=q;
  ST[id].a=a;
  OPN=null;
  save();
  toast('📊 Progresso salvo!');
  renderHeader();
  renderBoard();
}

// ─── EXPORT / IMPORT ────────────────────
function exportData(){
  const blob=new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='tcdf_progresso_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('⬇ Arquivo exportado!');
}

function showImport(){
  document.getElementById('imp-ta').value='';
  document.getElementById('modal').classList.add('show');
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
}

function importData(){
  try{
    const d=JSON.parse(document.getElementById('imp-ta').value.trim());
    if(typeof d!=='object'||Array.isArray(d)) throw new Error('formato inválido');
    ST={...ST,...d};
    // ensure all keys exist
    PHASES.forEach(ph=>ph.w.forEach(wk=>wk.d.forEach(dy=>{
      if(!ST[dy.id]) ST[dy.id]={ok:0,q:0,a:0};
    })));
    save();
    closeModal();
    renderHeader();
    renderBoard();
    toast('✅ Progresso importado!');
  }catch(e){
    alert('JSON inválido. Exporte novamente e tente colar o conteúdo completo.');
  }
}

document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

// ─── TOAST ──────────────────────────────
let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

// ─── INIT ───────────────────────────────
load();
renderHeader();
renderBoard();
</script>
</body>
</html>
